services:
  db:
    image: postgres:16-alpine
    container_name: ai-sales-copilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copilot}
      POSTGRES_DB: ${POSTGRES_DB:-copilot}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot} -d ${POSTGRES_DB:-copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  copilot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-sales-copilot:latest
    container_name: ai-sales-copilot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-copilot}:${POSTGRES_PASSWORD:-copilot}@db:5432/${POSTGRES_DB:-copilot}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_QUALITY: ${WHISPER_QUALITY:-balanced}
    volumes:
      # Persist the downloaded Whisper model across container restarts.
      - whisper-cache:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  whisper-cache:
    name: ai-sales-copilot-models
  db-data:
    name: ai-sales-copilot-db-data
